<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#09090b" />
    <title>NetflixLight</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
    <script>
      (() => {
        const storageKey = "netflixlight.theme";
        const storedTheme = window.localStorage.getItem(storageKey);
        const prefersLight = window.matchMedia(
          "(prefers-color-scheme: light)"
        ).matches;
        const theme =
          storedTheme === "light" || storedTheme === "dark"
            ? storedTheme
            : prefersLight
              ? "light"
              : "dark";

        document.documentElement.dataset.theme = theme;
      })();
    </script>
    <link rel="stylesheet" href="/css/app.css" />
  </head>
  <body class="min-h-screen bg-neutral-950 text-white">
    <main class="grid min-h-screen place-items-center px-6">
      <section
        class="w-full max-w-2xl rounded-3xl border border-white/10 bg-white/5 p-8 shadow-2xl shadow-black/30 backdrop-blur sm:p-12"
      >
        <h1
          class="mx-auto max-w-2xl text-center text-4xl font-semibold tracking-tight sm:text-6xl"
        >
          Movies
        </h1>
      </section>
    </main>
  </body>
</html>
